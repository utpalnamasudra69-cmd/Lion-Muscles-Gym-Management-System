<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Lion Muscles Gym - Manager Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            padding: 12px;
            background-image: radial-gradient(ellipse at 30% 50%, rgba(180, 140, 70, 0.05) 0%, transparent 60%), radial-gradient(ellipse at 70% 50%, rgba(180, 140, 70, 0.03) 0%, transparent 60%);
        }
        .app {
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
            background: #161616;
            border-radius: 20px;
            border: 1px solid rgba(180, 140, 70, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            padding: 16px 16px;
            animation: slideUp 0.6s ease-out;
            position: relative;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .app::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #b48c46, transparent);
            border-radius: 20px 20px 0 0;
        }
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2a2218;
        }
        @media (min-width: 768px) {
            .header {
                flex-direction: row;
                justify-content: space-between;
            }
            .app {
                padding: 24px 28px;
                border-radius: 28px;
            }
            body {
                padding: 20px;
            }
        }
        .header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #e8d5b5;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        @media (min-width: 768px) {
            .header h1 {
                font-size: 28px;
            }
        }
        .header h1 i {
            color: #b48c46;
            font-size: 24px;
            animation: glowPulse 3s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,
            100% { filter: drop-shadow(0 0 10px rgba(180, 140, 70, 0.2)); }
            50% { filter: drop-shadow(0 0 30px rgba(180, 140, 70, 0.4)); }
        }
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }
        @media (min-width: 768px) {
            .header-actions {
                width: auto;
                justify-content: flex-end;
            }
        }
        .role-badge {
            padding: 4px 14px;
            border-radius: 50px;
            background: rgba(180, 140, 70, 0.12);
            color: #b48c46;
            border: 1px solid rgba(180, 140, 70, 0.15);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        @media (min-width: 768px) {
            .role-badge {
                font-size: 12px;
                padding: 6px 18px;
            }
        }
        .logout-btn {
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.03);
            color: #8a7a5a;
            border: 1px solid #2a2218;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 12px;
            white-space: nowrap;
        }
        @media (min-width: 768px) {
            .logout-btn {
                padding: 8px 22px;
                font-size: 13px;
            }
        }
        .logout-btn:hover {
            background: rgba(180, 30, 30, 0.08);
            border-color: #b33838;
            color: #b33838;
        }

        /* Filter Buttons - Mobile Friendly */
        .filter-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 10px 0 16px 0;
        }
        @media (min-width: 500px) {
            .filter-buttons {
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }
        }
        @media (min-width: 768px) {
            .filter-buttons {
                gap: 12px;
                margin: 12px 0 20px 0;
            }
        }
        .filter-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid #2a2218;
            padding: 10px 8px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #8a7a5a;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            transition: 0.3s;
            text-align: center;
            min-height: 44px;
            touch-action: manipulation;
        }
        @media (min-width: 500px) {
            .filter-btn {
                font-size: 12px;
                padding: 10px 16px;
                gap: 8px;
            }
        }
        @media (min-width: 768px) {
            .filter-btn {
                font-size: 14px;
                padding: 10px 22px;
                min-height: auto;
            }
        }
        .filter-btn i {
            font-size: 14px;
            transition: 0.3s;
        }
        @media (min-width: 768px) {
            .filter-btn i {
                font-size: 16px;
            }
        }
        .filter-btn.active {
            background: rgba(180, 140, 70, 0.12);
            border-color: #b48c46;
            color: #b48c46;
        }
        .filter-btn:active {
            transform: scale(0.95);
        }
        .filter-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.04);
            border-color: #3a3228;
            color: #e8d5b5;
        }

        .register-btn {
            padding: 10px 12px;
            background: linear-gradient(135deg, #b48c46, #9a7a3a);
            color: #ffffff;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            transition: 0.3s;
            min-height: 44px;
            touch-action: manipulation;
            width: 100%;
        }
        @media (min-width: 500px) {
            .register-btn {
                font-size: 12px;
                padding: 10px 16px;
            }
        }
        @media (min-width: 768px) {
            .register-btn {
                font-size: 14px;
                padding: 10px 26px;
                width: auto;
                min-height: auto;
            }
        }
        .register-btn:active {
            transform: scale(0.95);
        }
        .register-btn:hover {
            background: linear-gradient(135deg, #c89c50, #a88840);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(180, 140, 70, 0.2);
        }

        .dashboard {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }
        .dashboard.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Stats Grid - Mobile Friendly */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        @media (min-width: 500px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
            }
        }
        @media (min-width: 768px) {
            .stats-grid {
                gap: 16px;
                margin-bottom: 24px;
            }
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid #2a2218;
            border-radius: 16px;
            padding: 12px 14px;
            transition: 0.3s;
            cursor: pointer;
            touch-action: manipulation;
        }
        .stat-card:active {
            transform: scale(0.95);
        }
        @media (min-width: 768px) {
            .stat-card {
                padding: 18px 22px;
                border-radius: 20px;
            }
            .stat-card:hover {
                border-color: #3a3228;
                transform: translateY(-3px);
            }
        }
        .stat-card .label {
            font-size: 10px;
            color: #8a7a5a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        @media (min-width: 768px) {
            .stat-card .label {
                font-size: 13px;
                letter-spacing: 1px;
                gap: 8px;
            }
        }
        .stat-card .label i {
            color: #b48c46;
            font-size: 12px;
        }
        @media (min-width: 768px) {
            .stat-card .label i {
                font-size: 16px;
            }
        }
        .stat-card .value {
            font-family: 'Oswald', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #e8d5b5;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }
        @media (min-width: 768px) {
            .stat-card .value {
                font-size: 34px;
                margin-top: 6px;
                letter-spacing: 1px;
            }
        }
        .stat-card .sub {
            font-size: 10px;
            color: #b48c46;
            margin-top: 2px;
        }
        @media (min-width: 768px) {
            .stat-card .sub {
                font-size: 13px;
                margin-top: 4px;
            }
        }

        /* Table - Mobile Friendly */
        .table-wrap {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid #2a2218;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        @media (min-width: 768px) {
            .table-wrap {
                border-radius: 16px;
            }
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            min-width: 700px;
        }
        @media (min-width: 768px) {
            table {
                font-size: 13px;
                min-width: auto;
            }
        }
        th {
            text-align: left;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.02);
            color: #8a7a5a;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 9px;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2a2218;
            white-space: nowrap;
        }
        @media (min-width: 768px) {
            th {
                padding: 14px 18px;
                font-size: 11px;
                letter-spacing: 0.5px;
            }
        }
        td {
            padding: 8px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: #d4c4a4;
            vertical-align: middle;
        }
        @media (min-width: 768px) {
            td {
                padding: 13px 18px;
            }
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Badges - Mobile Friendly */
        .badge {
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            display: inline-block;
            white-space: nowrap;
        }
        @media (min-width: 768px) {
            .badge {
                padding: 4px 14px;
                font-size: 11px;
                letter-spacing: 0.5px;
            }
        }
        .badge.paid {
            background: rgba(45, 125, 70, 0.15);
            color: #4caf84;
            border: 1px solid rgba(45, 125, 70, 0.15);
        }
        .badge.pending {
            background: rgba(200, 160, 50, 0.12);
            color: #c8a032;
            border: 1px solid rgba(200, 160, 50, 0.12);
        }
        .badge.overdue {
            background: rgba(180, 30, 30, 0.12);
            color: #b33838;
            border: 1px solid rgba(180, 30, 30, 0.12);
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .badge.monthly {
            background: rgba(180, 140, 70, 0.12);
            color: #b48c46;
            border: 1px solid rgba(180, 140, 70, 0.12);
        }
        .badge.yearly {
            background: rgba(200, 160, 50, 0.12);
            color: #c8a032;
            border: 1px solid rgba(200, 160, 50, 0.12);
        }

        /* Action Buttons - Mobile Friendly */
        .action-btn {
            background: none;
            border: none;
            padding: 4px 8px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 9px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin: 1px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            font-family: 'Inter', sans-serif;
            touch-action: manipulation;
            white-space: nowrap;
        }
        .action-btn:active {
            transform: scale(0.9);
        }
        @media (min-width: 768px) {
            .action-btn {
                padding: 5px 14px;
                font-size: 11px;
                letter-spacing: 0.5px;
                margin: 2px;
                gap: 6px;
            }
        }
        .action-btn.pay {
            background: rgba(45, 125, 70, 0.12);
            color: #4caf84;
            border: 1px solid rgba(45, 125, 70, 0.12);
        }
        .action-btn.pay:hover {
            background: rgba(45, 125, 70, 0.2);
        }
        .action-btn.notify {
            background: rgba(180, 140, 70, 0.12);
            color: #b48c46;
            border: 1px solid rgba(180, 140, 70, 0.12);
        }
        .action-btn.notify:hover {
            background: rgba(180, 140, 70, 0.2);
        }
        .action-btn.delete {
            background: rgba(180, 30, 30, 0.12);
            color: #b33838;
            border: 1px solid rgba(180, 30, 30, 0.12);
        }
        .action-btn.delete:hover {
            background: rgba(180, 30, 30, 0.2);
            box-shadow: 0 0 30px rgba(180, 30, 30, 0.1);
        }

        .member-detail {
            display: block;
            font-size: 9px;
            color: #8a7a5a;
            margin-top: 1px;
        }
        @media (min-width: 768px) {
            .member-detail {
                font-size: 12px;
                margin-top: 2px;
            }
        }
        .member-detail i {
            margin-right: 3px;
            width: 12px;
            color: #5a4a2a;
        }
        @media (min-width: 768px) {
            .member-detail i {
                margin-right: 4px;
                width: 14px;
            }
        }

        /* Toast - Mobile Friendly */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 20px;
            border-radius: 50px;
            color: #ffffff;
            font-weight: 600;
            z-index: 1000;
            animation: slideIn 0.4s ease-out;
            font-size: 13px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            text-align: center;
        }
        @media (min-width: 768px) {
            .toast {
                bottom: 30px;
                right: 30px;
                left: auto;
                transform: none;
                padding: 14px 26px;
                font-size: 14px;
                max-width: 400px;
            }
        }
        .toast.success {
            background: #2d7d46;
        }
        .toast.error {
            background: #b33838;
        }
        .toast.info {
            background: #b48c46;
        }
        @keyframes slideIn {
            from { transform: translateY(100px) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        @media (min-width: 768px) {
            @keyframes slideIn {
                from { transform: translateX(100px) scale(0.9); opacity: 0; }
                to { transform: translateX(0) scale(1); opacity: 1; }
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        @media (min-width: 768px) {
            ::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(180, 140, 70, 0.3);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(180, 140, 70, 0.5);
        }

        /* Fix for mobile touch */
        button,
        .filter-btn,
        .register-btn,
        .action-btn,
        .stat-card {
            -webkit-tap-highlight-color: transparent;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: #8a7a5a;
        }
        @media (min-width: 768px) {
            .empty-state {
                padding: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="app">
        <div class="header">
            <h1><i class="fas fa-crown"></i> Lion Muscles</h1>
            <div class="header-actions">
                <span class="role-badge"><i class="fas fa-user-tie"></i> Manager</span>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <!-- Filter Buttons - Mobile Responsive -->
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all" onclick="applyFilter('all')">
                <i class="fas fa-users"></i> All
            </button>
            <button class="filter-btn" data-filter="overdue" onclick="applyFilter('overdue')">
                <i class="fas fa-exclamation-triangle"></i> Overdue
            </button>
            <button class="filter-btn" data-filter="yearly" onclick="applyFilter('yearly')">
                <i class="fas fa-calendar-alt"></i> Yearly
            </button>
            <button class="register-btn" onclick="window.location.href='register.html'">
                <i class="fas fa-user-plus"></i> New
            </button>
        </div>

        <div class="dashboard active" id="membersDashboard">
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card" onclick="applyFilter('all')">
                    <div class="label"><i class="fas fa-users"></i> Total</div>
                    <div class="value" id="totalMembers">0</div>
                </div>
                <div class="stat-card" onclick="applyFilter('all')">
                    <div class="label"><i class="fas fa-check-circle"></i> Paid</div>
                    <div class="value" id="paidMembers">0</div>
                    <div class="sub">This month</div>
                </div>
                <div class="stat-card" onclick="applyFilter('overdue')">
                    <div class="label"><i class="fas fa-exclamation-circle"></i> Overdue</div>
                    <div class="value" id="overdueMembers" style="color:#b33838;">0</div>
                    <div class="sub">Need attention</div>
                </div>
                <div class="stat-card" onclick="applyFilter('yearly')">
                    <div class="label"><i class="fas fa-calendar-alt"></i> Yearly</div>
                    <div class="value" id="yearlyMembers">0</div>
                    <div class="sub">Annual</div>
                </div>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Member</th>
                            <th>Contact</th>
                            <th>Plan</th>
                            <th>Payment</th>
                            <th>Days</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="membersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://lion-muscles-gym-management-system.onrender.com/api';
        let token = localStorage.getItem('token');
        let allMembers = [];
        let currentFilter = 'all';

        // Session timeout
        let inactivityTimer;

        function resetTimer() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                alert('Session expired due to inactivity. Please login again.');
                localStorage.clear();
                window.location.href = 'login.html';
            }, 30 * 60 * 1000);
        }
        document.addEventListener('mousemove', resetTimer);
        document.addEventListener('keypress', resetTimer);
        document.addEventListener('click', resetTimer);
        document.addEventListener('scroll', resetTimer);
        resetTimer();

        if (!token || localStorage.getItem('role') !== 'manager') {
            window.location.href = 'login.html';
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // ===== FILTER FUNCTION =====
        function applyFilter(filter) {
            currentFilter = filter;

            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.filter === filter) {
                    btn.classList.add('active');
                }
            });

            // Filter members
            let filteredMembers = allMembers;

            if (filter === 'overdue') {
                filteredMembers = allMembers.filter(m => !m.isPaid && m.isOverdue);
            } else if (filter === 'yearly') {
                filteredMembers = allMembers.filter(m => m.subscriptionType === 'yearly');
            }

            renderMembers(filteredMembers);
        }

        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const stats = await response.json();
                document.getElementById('totalMembers').textContent = stats.totalMembers || 0;
                document.getElementById('paidMembers').textContent = stats.paidMembers || 0;
                document.getElementById('overdueMembers').textContent = stats.overdueMembers || 0;
                document.getElementById('yearlyMembers').textContent = stats.yearlyMembers || 0;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadMembers() {
            try {
                const response = await fetch(`${API_URL}/members`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                allMembers = await response.json();
                applyFilter(currentFilter);
            } catch (error) {
                showToast('Error loading members', 'error');
            }
        }

        function renderMembers(members) {
            const tbody = document.getElementById('membersTableBody');
            if (!members || members.length === 0) {
                let message = 'No members registered yet';
                if (currentFilter === 'overdue') message = 'No overdue members!';
                if (currentFilter === 'yearly') message = 'No yearly members found.';
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align:center; padding:30px 20px; color:#8a7a5a;">
                            <i class="fas fa-info-circle" style="color:#b48c46; font-size:24px; display:block; margin-bottom:10px;"></i>
                            ${message}
                        </td>
                    </tr>
                `;
                return;
            }
            tbody.innerHTML = members.map(m => `
                    <tr>
                        <td>
                            <strong style="color:#e8d5b5; font-size:12px;">${m.name}</strong>
                            <span class="member-detail"><i class="fas fa-user"></i> ${m.username}</span>
                            <span class="member-detail"><i class="fas fa-tag"></i> ${m.subscriptionType === 'monthly' ? '₹700' : '₹5,000'}</span>
                        </td>
                        <td>
                            <span class="member-detail"><i class="fas fa-envelope"></i> ${m.email || 'N/A'}</span>
                            <span class="member-detail"><i class="fas fa-phone"></i> ${m.phone || 'N/A'}</span>
                        </td>
                        <td><span class="badge ${m.subscriptionType}">${m.subscriptionType}</span></td>
                        <td>
                            <span class="member-detail"><i class="fas fa-calendar"></i> ${new Date(m.nextPaymentDate).toLocaleDateString()}</span>
                        </td>
                        <td>${m.daysLeft !== undefined ? (m.daysLeft < 0 ? `<span style="color:#b33838; font-weight:700;">${Math.abs(m.daysLeft)}</span>` : `<span style="color:#4caf84;">${m.daysLeft}</span>`) : 'N/A'}</td>
                        <td><span class="badge ${m.isPaid ? 'paid' : (m.isOverdue ? 'overdue' : 'pending')}">${m.isPaid ? 'Paid' : (m.isOverdue ? 'Overdue' : 'Pending')}</span></td>
                        <td>
                            ${!m.isPaid ? `<button class="action-btn pay" onclick="markPaid('${m._id}')"><i class="fas fa-check"></i> Pay</button>` : ''}
                            <button class="action-btn notify" onclick="sendNotification('${m._id}')"><i class="fas fa-bell"></i></button>
                            <button class="action-btn delete" onclick="deleteMember('${m._id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
        }

        async function markPaid(memberId) {
            if (!confirm('Mark this member as paid?')) return;
            try {
                const response = await fetch(`${API_URL}/members/${memberId}/pay`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                if (data.success) {
                    showToast('Payment marked as paid!', 'success');
                    loadMembers();
                    loadStats();
                } else {
                    showToast('Error marking payment', 'error');
                }
            } catch (error) {
                showToast('Server error', 'error');
            }
        }

        async function sendNotification(memberId) {
            const message = prompt('Enter notification message:', 'Payment reminder: Your subscription is due soon.');
            if (message === null) return;
            try {
                const response = await fetch(`${API_URL}/members/${memberId}/notify`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message || 'Payment reminder: Your subscription is due soon.' })
                });
                const data = await response.json();
                if (data.success) {
                    showToast('Notification sent!', 'success');
                } else {
                    showToast('Error sending notification', 'error');
                }
            } catch (error) {
                showToast('Server error', 'error');
            }
        }

        async function deleteMember(memberId) {
            if (!confirm('Are you sure you want to delete this member? This action cannot be undone!')) return;
            try {
                const response = await fetch(`${API_URL}/members/${memberId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                if (data.success) {
                    showToast(' ' + data.message, 'success');
                    loadMembers();
                    loadStats();
                } else {
                    showToast('Error deleting member: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                showToast('Server error: ' + error.message, 'error');
            }
        }

        loadMembers();
        loadStats();
    </script>

</body>
</html>
