<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lion Muscles Gym - Manager Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      min-height: 100vh;
      padding: 20px;
      background-image: 
        radial-gradient(ellipse at 30% 50%, rgba(180, 140, 70, 0.05) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 50%, rgba(180, 140, 70, 0.03) 0%, transparent 60%);
    }
    .app {
      max-width: 1600px;
      width: 100%;
      margin: 0 auto;
      background: #161616;
      border-radius: 28px;
      border: 1px solid rgba(180, 140, 70, 0.15);
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      padding: 28px 32px;
      animation: slideUp 0.6s ease-out;
      position: relative;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .app::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #b48c46, transparent);
      border-radius: 28px 28px 0 0;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #2a2218;
    }
    .header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #e8d5b5;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header h1 i { color: #b48c46; font-size: 28px; }
    .header-actions { display: flex; gap: 12px; align-items: center; }
    .role-badge {
      padding: 6px 18px;
      border-radius: 50px;
      background: rgba(180, 140, 70, 0.12);
      color: #b48c46;
      border: 1px solid rgba(180, 140, 70, 0.15);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logout-btn {
      padding: 8px 22px;
      background: rgba(255,255,255,0.03);
      color: #8a7a5a;
      border: 1px solid #2a2218;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      font-size: 13px;
    }
    .logout-btn:hover {
      background: rgba(180, 30, 30, 0.08);
      border-color: #b33838;
      color: #b33838;
    }
    .nav-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 12px 0 24px 0;
    }
    .nav-btn {
      background: rgba(255,255,255,0.02);
      border: 1px solid #2a2218;
      padding: 10px 22px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #8a7a5a;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: 0.3s;
    }
    .nav-btn i { font-size: 16px; transition: 0.3s; }
    .nav-btn.active {
      background: rgba(180, 140, 70, 0.12);
      border-color: #b48c46;
      color: #b48c46;
    }
    .nav-btn:hover:not(.active) {
      background: rgba(255,255,255,0.04);
      border-color: #3a3228;
      color: #e8d5b5;
    }
    .register-btn {
      padding: 10px 26px;
      background: linear-gradient(135deg, #b48c46, #9a7a3a);
      color: #ffffff;
      border: none;
      border-radius: 50px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: 0.3s;
    }
    .register-btn:hover {
      background: linear-gradient(135deg, #c89c50, #a88840);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(180, 140, 70, 0.2);
    }
    .dashboard { display: none; animation: fadeIn 0.4s ease-out; }
    .dashboard.active { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid #2a2218;
      border-radius: 20px;
      padding: 20px 24px;
      transition: 0.3s;
    }
    .stat-card:hover {
      border-color: #3a3228;
      transform: translateY(-3px);
    }
    .stat-card .label {
      font-size: 13px;
      color: #8a7a5a;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stat-card .label i { color: #b48c46; }
    .stat-card .value {
      font-family: 'Oswald', sans-serif;
      font-size: 34px;
      font-weight: 700;
      color: #e8d5b5;
      margin-top: 6px;
      letter-spacing: 1px;
    }
    .stat-card .sub { font-size: 13px; color: #b48c46; margin-top: 4px; }
    .table-wrap {
      background: rgba(255,255,255,0.02);
      border-radius: 16px;
      border: 1px solid #2a2218;
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left;
      padding: 14px 18px;
      background: rgba(255,255,255,0.02);
      color: #8a7a5a;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #2a2218;
      white-space: nowrap;
    }
    td {
      padding: 13px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      color: #d4c4a4;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .badge {
      padding: 4px 14px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: inline-block;
    }
    .badge.paid {
      background: rgba(45, 125, 70, 0.15);
      color: #4caf84;
      border: 1px solid rgba(45, 125, 70, 0.15);
    }
    .badge.pending {
      background: rgba(200, 160, 50, 0.12);
      color: #c8a032;
      border: 1px solid rgba(200, 160, 50, 0.12);
    }
    .badge.overdue {
      background: rgba(180, 30, 30, 0.12);
      color: #b33838;
      border: 1px solid rgba(180, 30, 30, 0.12);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .badge.monthly {
      background: rgba(180, 140, 70, 0.12);
      color: #b48c46;
      border: 1px solid rgba(180, 140, 70, 0.12);
    }
    .badge.yearly {
      background: rgba(200, 160, 50, 0.12);
      color: #c8a032;
      border: 1px solid rgba(200, 160, 50, 0.12);
    }
    .action-btn {
      background: none;
      border: none;
      padding: 5px 14px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 11px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 2px;
      transition: 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: 'Inter', sans-serif;
    }
    .action-btn.pay {
      background: rgba(45, 125, 70, 0.12);
      color: #4caf84;
      border: 1px solid rgba(45, 125, 70, 0.12);
    }
    .action-btn.pay:hover { background: rgba(45, 125, 70, 0.2); }
    .action-btn.notify {
      background: rgba(180, 140, 70, 0.12);
      color: #b48c46;
      border: 1px solid rgba(180, 140, 70, 0.12);
    }
    .action-btn.notify:hover { background: rgba(180, 140, 70, 0.2); }
    .action-btn.delete {
      background: rgba(180, 30, 30, 0.12);
      color: #b33838;
      border: 1px solid rgba(180, 30, 30, 0.12);
    }
    .action-btn.delete:hover {
      background: rgba(180, 30, 30, 0.2);
      box-shadow: 0 0 30px rgba(180, 30, 30, 0.1);
    }
    .member-detail {
      display: block;
      font-size: 12px;
      color: #8a7a5a;
      margin-top: 2px;
    }
    .member-detail i {
      margin-right: 4px;
      width: 14px;
      color: #5a4a2a;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      padding: 14px 26px;
      border-radius: 50px;
      color: #ffffff;
      font-weight: 600;
      z-index: 1000;
      animation: slideIn 0.4s ease-out;
      font-size: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    .toast.success { background: #2d7d46; }
    .toast.error { background: #b33838; }
    .toast.info { background: #b48c46; }
    @keyframes slideIn {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @media (max-width: 768px) {
      .app { padding: 16px; border-radius: 20px; }
      .header h1 { font-size: 20px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      th, td { padding: 10px 12px; font-size: 11px; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
      .nav-buttons { flex-direction: column; }
      .nav-btn { justify-content: center; }
      .header-actions { width: 100%; justify-content: flex-end; }
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(180, 140, 70, 0.3); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(180, 140, 70, 0.5); }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1><i class="fas fa-crown"></i> Lion Muscles</h1>
    <div class="header-actions">
      <span class="role-badge"><i class="fas fa-user-tie"></i> Manager</span>
      <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </div>

  <div class="nav-buttons">
    <button class="nav-btn active" onclick="switchDashboard('members')">
      <i class="fas fa-users"></i> Members
    </button>
    <button class="nav-btn" onclick="switchDashboard('overdue')">
      <i class="fas fa-exclamation-triangle"></i> Overdue
    </button>
    <button class="register-btn" onclick="window.location.href='register.html'">
      <i class="fas fa-user-plus"></i> New Member
    </button>
  </div>

  <div class="dashboard active" id="membersDashboard">
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="label"><i class="fas fa-users"></i> Total Members</div>
        <div class="value" id="totalMembers">0</div>
      </div>
      <div class="stat-card">
        <div class="label"><i class="fas fa-check-circle"></i> Paid</div>
        <div class="value" id="paidMembers">0</div>
        <div class="sub">This month</div>
      </div>
      <div class="stat-card">
        <div class="label"><i class="fas fa-exclamation-circle"></i> Overdue</div>
        <div class="value" id="overdueMembers" style="color:#b33838;">0</div>
        <div class="sub">Need attention</div>
      </div>
      <div class="stat-card">
        <div class="label"><i class="fas fa-calendar-alt"></i> Yearly</div>
        <div class="value" id="yearlyMembers">0</div>
        <div class="sub">Annual subscriptions</div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Member Details</th>
            <th>Contact</th>
            <th>Subscription</th>
            <th>Payment Dates</th>
            <th>Days Left</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="membersTableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="dashboard" id="overdueDashboard">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:20px;">
      <i class="fas fa-exclamation-triangle" style="color:#b33838; font-size:24px;"></i>
      <h3 style="color:#e8d5b5; font-family:'Oswald',sans-serif; letter-spacing:1px;">Overdue Members</h3>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Member</th>
            <th>Contact</th>
            <th>Subscription</th>
            <th>Days Overdue</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="overdueTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // ===== UPDATE THIS FOR DEPLOYMENT =====
 const API_URL = 'https://lion-muscles-gym-management-system.onrender.com/api';
  let token = localStorage.getItem('token');

  if (!token || localStorage.getItem('role') !== 'manager') {
    window.location.href = 'index.html';
  }

  function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }

  function logout() {
    localStorage.clear();
    window.location.href = 'index.html';
  }

  function switchDashboard(type) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    
    if (type === 'members') {
      document.getElementById('membersDashboard').classList.add('active');
      document.getElementById('overdueDashboard').classList.remove('active');
      document.querySelector('.nav-btn:nth-child(1)').classList.add('active');
      loadMembers();
      loadStats();
    } else if (type === 'overdue') {
      document.getElementById('membersDashboard').classList.remove('active');
      document.getElementById('overdueDashboard').classList.add('active');
      document.querySelector('.nav-btn:nth-child(2)').classList.add('active');
      loadOverdue();
    }
  }

  async function loadStats() {
    try {
      const response = await fetch(`${API_URL}/stats`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const stats = await response.json();
      
      document.getElementById('totalMembers').textContent = stats.totalMembers || 0;
      document.getElementById('paidMembers').textContent = stats.paidMembers || 0;
      document.getElementById('overdueMembers').textContent = stats.overdueMembers || 0;
      document.getElementById('yearlyMembers').textContent = stats.yearlyMembers || 0;
    } catch (error) {
      console.error('Error loading stats:', error);
    }
  }

  async function loadMembers() {
    try {
      const response = await fetch(`${API_URL}/members`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const members = await response.json();
      renderMembers(members);
    } catch (error) {
      showToast('Error loading members', 'error');
    }
  }

  function renderMembers(members) {
    const tbody = document.getElementById('membersTableBody');
    
    if (!members || members.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:40px; color:#8a7a5a;">No members registered yet</td></tr>`;
      return;
    }
    
    tbody.innerHTML = members.map(m => `
      <tr>
        <td>
          <strong style="color:#e8d5b5; font-size:14px;">${m.name}</strong>
          <span class="member-detail"><i class="fas fa-user"></i> ${m.username}</span>
          <span class="member-detail"><i class="fas fa-map-marker-alt"></i> ${m.address || 'N/A'}</span>
        </td>
        <td>
          <span class="member-detail"><i class="fas fa-envelope"></i> ${m.email || 'N/A'}</span>
          <span class="member-detail"><i class="fas fa-phone"></i> ${m.phone || 'N/A'}</span>
        </td>
        <td><span class="badge ${m.subscriptionType}">${m.subscriptionType}</span></td>
        <td>
          <span class="member-detail"><i class="fas fa-calendar"></i> Last: ${new Date(m.lastPaymentDate).toLocaleDateString()}</span>
          <span class="member-detail"><i class="fas fa-calendar-plus"></i> Next: ${new Date(m.nextPaymentDate).toLocaleDateString()}</span>
        </td>
        <td>
          ${m.daysLeft !== undefined ? 
            (m.daysLeft < 0 ? 
              `<span style="color:#b33838; font-weight:700;">${Math.abs(m.daysLeft)} days overdue</span>` : 
              `<span style="color:#4caf84;">${m.daysLeft} days</span>`
            ) : 'N/A'}
        </td>
        <td><span class="badge ${m.isPaid ? 'paid' : (m.isOverdue ? 'overdue' : 'pending')}">
          ${m.isPaid ? 'Paid' : (m.isOverdue ? 'Overdue' : 'Pending')}
        </span></td>
        <td>
          ${!m.isPaid ? `<button class="action-btn pay" onclick="markPaid('${m._id}')"><i class="fas fa-check"></i> Pay</button>` : ''}
          <button class="action-btn notify" onclick="sendNotification('${m._id}')"><i class="fas fa-bell"></i> Notify</button>
          <button class="action-btn delete" onclick="deleteMember('${m._id}')"><i class="fas fa-trash"></i> Delete</button>
        </td>
      </tr>
    `).join('');
  }

  async function loadOverdue() {
    try {
      const response = await fetch(`${API_URL}/members/overdue`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const overdue = await response.json();
      const tbody = document.getElementById('overdueTableBody');
      
      if (!overdue || overdue.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:40px; color:#8a7a5a;">No overdue members. All payments are up to date.</td></tr>`;
        return;
      }
      
      tbody.innerHTML = overdue.map(m => {
        const daysOverdue = Math.ceil((new Date() - new Date(m.nextPaymentDate)) / (1000 * 60 * 60 * 24));
        return `
          <tr>
            <td>
              <strong style="color:#e8d5b5;">${m.name}</strong>
              <span class="member-detail"><i class="fas fa-user"></i> ${m.username}</span>
            </td>
            <td>
              <span class="member-detail"><i class="fas fa-envelope"></i> ${m.email}</span>
              <span class="member-detail"><i class="fas fa-phone"></i> ${m.phone}</span>
            </td>
            <td><span class="badge ${m.subscriptionType}">${m.subscriptionType}</span></td>
            <td style="color:#b33838; font-weight:700;">${daysOverdue} days</td>
            <td>
              <button class="action-btn pay" onclick="markPaid('${m._id}')"><i class="fas fa-check"></i> Pay</button>
              <button class="action-btn notify" onclick="sendNotification('${m._id}')"><i class="fas fa-bell"></i> Notify</button>
              <button class="action-btn delete" onclick="deleteMember('${m._id}')"><i class="fas fa-trash"></i> Delete</button>
            </td>
          </tr>
        `;
      }).join('');
    } catch (error) {
      showToast('Error loading overdue members', 'error');
    }
  }

  async function markPaid(memberId) {
    if (!confirm('Mark this member as paid?')) return;
    
    try {
      const response = await fetch(`${API_URL}/members/${memberId}/pay`, {
        method: 'PUT',
        headers: { 
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        }
      });
      const data = await response.json();
      
      if (data.success) {
        showToast('Payment marked as paid!', 'success');
        loadMembers();
        loadStats();
        if (document.getElementById('overdueDashboard').classList.contains('active')) {
          loadOverdue();
        }
      } else {
        showToast('Error marking payment', 'error');
      }
    } catch (error) {
      showToast('Server error', 'error');
    }
  }

  async function sendNotification(memberId) {
    const message = prompt('Enter notification message:', 'Payment reminder: Your subscription is due soon.');
    if (message === null) return;
    
    try {
      const response = await fetch(`${API_URL}/members/${memberId}/notify`, {
        method: 'POST',
        headers: { 
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ message: message || 'Payment reminder: Your subscription is due soon.' })
      });
      const data = await response.json();
      
      if (data.success) {
        showToast('Notification sent!', 'success');
      } else {
        showToast('Error sending notification', 'error');
      }
    } catch (error) {
      showToast('Server error', 'error');
    }
  }

  // ===== DELETE MEMBER FUNCTION =====
  async function deleteMember(memberId) {
    if (!confirm('⚠️ Are you sure you want to delete this member? This action cannot be undone!')) {
      return;
    }
    
    try {
      const response = await fetch(`${API_URL}/members/${memberId}`, {
        method: 'DELETE',
        headers: { 
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        }
      });
      const data = await response.json();
      
      if (data.success) {
        showToast('✅ ' + data.message, 'success');
        loadMembers();
        loadStats();
        if (document.getElementById('overdueDashboard').classList.contains('active')) {
          loadOverdue();
        }
      } else {
        showToast('Error deleting member: ' + (data.error || 'Unknown error'), 'error');
      }
    } catch (error) {
      showToast('Server error: ' + error.message, 'error');
    }
  }

  loadMembers();
  loadStats();
</script>
</body>
</html>
