<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lion Muscles Gym - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: #0f0f0f;
      background-image: 
        radial-gradient(ellipse at 30% 50%, rgba(180, 140, 70, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 50%, rgba(180, 140, 70, 0.04) 0%, transparent 60%);
    }
    .login-container {
      position: relative;
      max-width: 460px;
      width: 100%;
      background: #161616;
      border-radius: 28px;
      border: 1px solid rgba(180, 140, 70, 0.2);
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      padding: 40px 36px;
      animation: slideUp 0.6s ease-out;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .login-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #b48c46, transparent);
      border-radius: 28px 28px 0 0;
    }
    .login-header { text-align: center; margin-bottom: 36px; }
    .login-header .icon { font-size: 48px; color: #b48c46; display: inline-block; animation: glowPulse 3s ease-in-out infinite; }
    @keyframes glowPulse { 0%, 100% { filter: drop-shadow(0 0 10px rgba(180, 140, 70, 0.2)); } 50% { filter: drop-shadow(0 0 30px rgba(180, 140, 70, 0.4)); } }
    .login-header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #e8d5b5;
      margin-top: 8px;
    }
    .login-header .subtitle { color: #8a7a5a; margin-top: 4px; font-size: 14px; letter-spacing: 4px; text-transform: uppercase; font-weight: 300; }
    .login-form { display: flex; flex-direction: column; gap: 16px; }
    .login-form .input-group { position: relative; }
    .login-form .input-group i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #5a4a2a;
      font-size: 16px;
      transition: 0.3s;
    }
    .login-form select,
    .login-form input {
      width: 100%;
      padding: 14px 18px 14px 46px;
      border: 1px solid #2a2218;
      border-radius: 50px;
      font-size: 14px;
      background: #0f0f0f;
      color: #d4c4a4;
      transition: 0.3s;
      font-family: 'Inter', sans-serif;
    }
    .login-form select:focus,
    .login-form input:focus {
      outline: none;
      border-color: #b48c46;
      background: #141414;
      box-shadow: 0 0 0 3px rgba(180, 140, 70, 0.08);
    }
    .login-form select:focus + i,
    .login-form input:focus + i { color: #b48c46; }
    .login-form select option { background: #161616; color: #d4c4a4; }
    .remember-me {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #8a7a5a;
      font-size: 14px;
      margin-top: -8px;
    }
    .remember-me input[type="checkbox"] { width: 18px; height: 18px; accent-color: #b48c46; cursor: pointer; }
    .remember-me label { cursor: pointer; }
    .login-btn {
      padding: 16px;
      background: linear-gradient(135deg, #b48c46, #9a7a3a);
      border: none;
      border-radius: 50px;
      color: #ffffff;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-family: 'Oswald', sans-serif;
      margin-top: 8px;
    }
    .login-btn:hover { background: linear-gradient(135deg, #c89c50, #a88840); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(180, 140, 70, 0.25); }
    .login-btn:active { transform: scale(0.98); }
    .register-link { text-align: center; margin-top: 22px; color: #8a7a5a; font-size: 14px; }
    .register-link a { color: #b48c46; text-decoration: none; font-weight: 600; transition: 0.3s; }
    .register-link a:hover { color: #c89c50; }
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      padding: 14px 26px;
      border-radius: 50px;
      color: #ffffff;
      font-weight: 600;
      z-index: 1000;
      animation: slideIn 0.4s ease-out;
      font-size: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    .toast.success { background: #2d7d46; }
    .toast.error { background: #b33838; }
    .toast.info { background: #b48c46; }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @media (max-width: 480px) {
      .login-container { padding: 28px 20px; }
      .login-header h1 { font-size: 28px; }
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <div class="icon"><i class="fas fa-crown"></i></div>
    <h1>Lion Muscles</h1>
    <p class="subtitle">Gym Management System</p>
  </div>

  <div class="login-form">
    <div class="input-group">
      <i class="fas fa-user-tie"></i>
      <select id="roleSelect">
        <option value="manager">Manager</option>
        <option value="member">Member</option>
      </select>
    </div>
    <div class="input-group">
      <i class="fas fa-user"></i>
      <input type="text" id="usernameInput" placeholder="Username" />
    </div>
    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="passwordInput" placeholder="Password" />
    </div>
    <div class="remember-me">
      <input type="checkbox" id="rememberMe" />
      <label for="rememberMe">Remember me</label>
    </div>
    <button class="login-btn" onclick="login()">
      <i class="fas fa-sign-in-alt"></i> Login
    </button>
  </div>

  <div class="register-link">
    New Member? <a href="register.html">Join Lion Muscles</a>
  </div>
</div>

<script>
  const API_URL = 'https://lion-muscles-gym-management-system.onrender.com/api';

  function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }

  window.onload = function() {
    const savedUsername = localStorage.getItem('rememberedUsername');
    const savedPassword = localStorage.getItem('rememberedPassword');
    const savedRole = localStorage.getItem('rememberedRole');
    if (savedUsername && savedPassword) {
      document.getElementById('usernameInput').value = savedUsername;
      document.getElementById('passwordInput').value = savedPassword;
      document.getElementById('rememberMe').checked = true;
      if (savedRole) document.getElementById('roleSelect').value = savedRole;
    }
  }

  async function login() {
    const role = document.getElementById('roleSelect').value;
    const username = document.getElementById('usernameInput').value.trim();
    const password = document.getElementById('passwordInput').value.trim();
    const rememberMe = document.getElementById('rememberMe').checked;

    if (!username || !password) {
      showToast('Please enter username and password', 'error');
      return;
    }

    try {
      const response = await fetch(`${API_URL}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, role })
      });
      const data = await response.json();

      if (data.success) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('role', data.role);
        localStorage.setItem('memberId', data.memberId || '');
        localStorage.setItem('managerId', data.managerId || '');
        
        if (rememberMe) {
          localStorage.setItem('rememberedUsername', username);
          localStorage.setItem('rememberedPassword', password);
          localStorage.setItem('rememberedRole', role);
        } else {
          localStorage.removeItem('rememberedUsername');
          localStorage.removeItem('rememberedPassword');
          localStorage.removeItem('rememberedRole');
        }
        
        showToast(data.message, 'success');
        setTimeout(() => {
          if (data.role === 'manager') {
            window.location.href = 'manager-dashboard.html';
          } else {
            window.location.href = 'member-dashboard.html';
          }
        }, 1000);
      } else {
        showToast(data.error || 'Login failed', 'error');
      }
    } catch (error) {
      showToast('Server error. Make sure backend is running!', 'error');
    }
  }

  document.getElementById('passwordInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') login();
  });
  document.getElementById('usernameInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
