<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lion Muscles Gym - Member Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(ellipse at 30% 50%, rgba(180, 140, 70, 0.05) 0%, transparent 60%), radial-gradient(ellipse at 70% 50%, rgba(180, 140, 70, 0.03) 0%, transparent 60%);
        }
        .app {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: #161616;
            border-radius: 28px;
            border: 1px solid rgba(180, 140, 70, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            padding: 28px 32px;
            animation: slideUp 0.6s ease-out;
            position: relative;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .app::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #b48c46, transparent);
            border-radius: 28px 28px 0 0;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2a2218;
        }
        .header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #e8d5b5;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 i {
            color: #b48c46;
            font-size: 28px;
            animation: glowPulse 3s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,
            100% { filter: drop-shadow(0 0 10px rgba(180, 140, 70, 0.2)); }
            50% { filter: drop-shadow(0 0 30px rgba(180, 140, 70, 0.4)); }
        }
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .role-badge {
            padding: 6px 18px;
            border-radius: 50px;
            background: rgba(180, 140, 70, 0.12);
            color: #b48c46;
            border: 1px solid rgba(180, 140, 70, 0.15);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logout-btn {
            padding: 8px 22px;
            background: rgba(255, 255, 255, 0.03);
            color: #8a7a5a;
            border: 1px solid #2a2218;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
        }
        .logout-btn:hover {
            background: rgba(180, 30, 30, 0.08);
            border-color: #b33838;
            color: #b33838;
        }
        .member-dash {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 10px;
        }
        .member-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 28px;
            border: 1px solid #2a2218;
            transition: 0.3s;
        }
        .member-card:hover { border-color: #3a3228; }
        .member-card h3 {
            font-family: 'Oswald', sans-serif;
            font-size: 20px;
            margin-bottom: 18px;
            color: #e8d5b5;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 1px;
        }
        .member-card h3 i { color: #b48c46; }
        .member-card p {
            color: #d4c4a4;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-between;
        }
        .member-card p strong { color: #8a7a5a; font-weight: 500; }
        .member-list { list-style: none; }
        .member-list li {
            padding: 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .member-list li:last-child { border: none; }
        .member-name { color: #d4c4a4; font-weight: 500; }
        .member-sub { font-size: 13px; color: #8a7a5a; }
        .badge {
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
        }
        .badge.paid {
            background: rgba(45, 125, 70, 0.15);
            color: #4caf84;
            border: 1px solid rgba(45, 125, 70, 0.15);
        }
        .badge.pending {
            background: rgba(200, 160, 50, 0.12);
            color: #c8a032;
            border: 1px solid rgba(200, 160, 50, 0.12);
        }
        .badge.overdue {
            background: rgba(180, 30, 30, 0.12);
            color: #b33838;
            border: 1px solid rgba(180, 30, 30, 0.12);
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .badge.monthly {
            background: rgba(180, 140, 70, 0.12);
            color: #b48c46;
            border: 1px solid rgba(180, 140, 70, 0.12);
        }
        .badge.yearly {
            background: rgba(200, 160, 50, 0.12);
            color: #c8a032;
            border: 1px solid rgba(200, 160, 50, 0.12);
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 26px;
            border-radius: 50px;
            color: #ffffff;
            font-weight: 600;
            z-index: 1000;
            animation: slideIn 0.4s ease-out;
            font-size: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        .toast.success { background: #2d7d46; }
        .toast.error { background: #b33838; }
        .toast.info { background: #b48c46; }
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .loading {
            text-align: center;
            color: #8a7a5a;
            padding: 50px;
            font-size: 16px;
        }
        .loading i {
            font-size: 36px;
            color: #b48c46;
            display: block;
            margin-bottom: 15px;
        }
        @media (max-width: 768px) {
            .app { padding: 16px; border-radius: 20px; }
            .header h1 { font-size: 20px; }
            .member-dash { grid-template-columns: 1fr; }
        }
        @media (max-width: 480px) {
            .app { padding: 12px; }
            .member-card { padding: 16px; }
            .header-actions { width: 100%; justify-content: flex-end; }
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(180, 140, 70, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(180, 140, 70, 0.5); }
    </style>
</head>
<body>

    <div class="app">
        <div class="header">
            <h1><i class="fas fa-crown"></i> Lion Muscles</h1>
            <div class="header-actions">
                <span class="role-badge"><i class="fas fa-user"></i> Member</span>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <div id="memberInfo">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                Loading your profile...
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://lion-muscles-gym-management-system.onrender.com/api';
        const token = localStorage.getItem('token');
        const memberId = localStorage.getItem('memberId');

        let inactivityTimer;

        function resetTimer() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                alert('Session expired due to inactivity. Please login again.');
                localStorage.clear();
                window.location.href = 'login.html';
            }, 30 * 60 * 1000);
        }
        document.addEventListener('mousemove', resetTimer);
        document.addEventListener('keypress', resetTimer);
        document.addEventListener('click', resetTimer);
        document.addEventListener('scroll', resetTimer);
        resetTimer();

        if (!token || localStorage.getItem('role') !== 'member') {
            window.location.href = 'login.html';
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        async function loadMemberDashboard() {
            if (!memberId) {
                document.getElementById('memberInfo').innerHTML = `
                        <div style="text-align:center; padding:50px; color:#b33838;">
                            <i class="fas fa-exclamation-circle" style="font-size:36px; display:block; margin-bottom:15px;"></i>
                            <h3 style="color:#e8d5b5;">Error: No Member ID Found</h3>
                            <p style="color:#8a7a5a; margin-top:10px;">Please login again.</p>
                            <button onclick="logout()" style="margin-top:20px; padding:12px 30px; background:linear-gradient(135deg,#b48c46,#9a7a3a); border:none; border-radius:50px; color:white; cursor:pointer; font-weight:700;">Go to Login</button>
                        </div>
                    `;
                return;
            }

            try {
                const response = await fetch(`${API_URL}/members/${memberId}`, {
                    headers: { 'Authorization': `Bearer ${token}`, 'X-Member-Id': memberId, 'Content-Type': 'application/json' }
                });
                if (!response.ok) { throw new Error(`HTTP error! status: ${response.status}`); }
                const member = await response.json();
                const container = document.getElementById('memberInfo');
                container.innerHTML = `
                        <div class="member-dash">
                            <div class="member-card">
                                <h3><i class="fas fa-user-circle"></i> My Profile</h3>
                                <p><strong>Username</strong> ${member.username || 'N/A'}</p>
                                <p><strong>Name</strong> ${member.name || 'N/A'}</p>
                                <p><strong>Email</strong> ${member.email || 'N/A'}</p>
                                <p><strong>Phone</strong> ${member.phone || 'N/A'}</p>
                                <p><strong>Address</strong> ${member.address || 'N/A'}</p>
                                <p><strong>Subscription</strong> <span class="badge ${member.subscriptionType}">${member.subscriptionType || 'N/A'}</span></p>
                                <p><strong>Fee</strong> ${member.subscriptionType === 'monthly' ? '₹700 / month' : '₹5,000 / year'}</p>
                                <p><strong>Join Date</strong> ${member.joinDate ? new Date(member.joinDate).toLocaleDateString() : 'N/A'}</p>
                                <p><strong>Last Payment</strong> ${member.lastPaymentDate ? new Date(member.lastPaymentDate).toLocaleDateString() : 'N/A'}</p>
                                <p><strong>Next Payment</strong> ${member.nextPaymentDate ? new Date(member.nextPaymentDate).toLocaleDateString() : 'N/A'}</p>
                                <p><strong>Days Left</strong> ${member.daysLeft !== undefined ? (member.daysLeft < 0 ? `<span style="color:#b33838; font-weight:700;">${Math.abs(member.daysLeft)} days overdue</span>` : `<span style="color:#4caf84;">${member.daysLeft} days</span>`) : 'N/A'}</p>
                                <p><strong>Status</strong> <span class="badge ${member.isPaid ? 'paid' : (member.isOverdue ? 'overdue' : 'pending')}">${member.isPaid ? 'Paid' : (member.isOverdue ? 'Overdue' : 'Pending')}</span></p>
                            </div>
                            <div class="member-card">
                                <h3><i class="fas fa-bell"></i> Notifications</h3>
                                ${member.notifications && member.notifications.length > 0 ? 
                                    `<ul class="member-list">${member.notifications.slice().reverse().map(n => `
                                        <li>
                                            <div><div class="member-name">${n.message}</div><div class="member-sub">${new Date(n.date).toLocaleDateString()} ${new Date(n.date).toLocaleTimeString()}</div></div>
                                            <span class="badge ${n.read ? 'paid' : 'pending'}">${n.read ? 'Read' : 'New'}</span>
                                        </li>
                                    `).join('')}</ul>` :
                                    '<p style="color:#8a7a5a; text-align:center; padding:30px;">No notifications yet</p>'
                                }
                            </div>
                        </div>
                    `;
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('memberInfo').innerHTML = `
                        <div style="text-align:center; padding:50px; color:#b33838;">
                            <i class="fas fa-exclamation-triangle" style="font-size:36px; display:block; margin-bottom:15px;"></i>
                            <h3 style="color:#e8d5b5;">Error Loading Dashboard</h3>
                            <p style="color:#8a7a5a; margin-top:10px;">${error.message}</p>
                            <p style="color:#8a7a5a; margin-top:5px;">Make sure the backend is running on port 5000</p>
                            <button onclick="location.reload()" style="margin-top:20px; padding:12px 30px; background:linear-gradient(135deg,#b48c46,#9a7a3a); border:none; border-radius:50px; color:white; cursor:pointer; font-weight:700;">Retry</button>
                            <button onclick="logout()" style="margin-top:10px; padding:12px 30px; background:rgba(255,255,255,0.03); border:1px solid #2a2218; border-radius:50px; color:#8a7a5a; cursor:pointer; margin-left:10px; font-weight:600;">Logout</button>
                        </div>
                    `;
                showToast('Error loading dashboard. Check if backend is running.', 'error');
            }
        }

        loadMemberDashboard();
    </script>

</body>
</html>
